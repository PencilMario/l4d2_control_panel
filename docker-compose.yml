services:
  panel-init:
    image: ${ALPINE_IMAGE:-alpine:3.22}
    user: "0:0"
    command: ["sh", "-c", "mkdir -p /srv/l4d2-panel && chown -R 10001:10001 /srv/l4d2-panel"]
    volumes:
      - ${L4D2_PANEL_DATA_ROOT:-/srv/l4d2-panel}:/srv/l4d2-panel
    restart: "no"
  runtime-image:
    image: l4d2-server-runtime:latest
    build:
      context: runtime
      args:
        STEAMCMD_IMAGE: ${STEAMCMD_IMAGE:-cm2network/steamcmd:root}
    entrypoint: ["/bin/true"]
    profiles: [images]
  socket-proxy:
    image: ${SOCKET_PROXY_IMAGE:-tecnativa/docker-socket-proxy:0.3.0}
    restart: unless-stopped
    environment:
      CONTAINERS: 1
      IMAGES: 1
      INFO: 1
      NETWORKS: 0
      SERVICES: 0
      TASKS: 0
      VOLUMES: 0
      POST: 1
      AUTH: 0
      SECRETS: 0
      SWARM: 0
      SYSTEM: 0
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks: [control]
    ports: ["127.0.0.1:${L4D2_PANEL_DOCKER_PROXY_PORT:-23750}:2375"]
    read_only: true
  panel:
    build: .
    restart: unless-stopped
    depends_on:
      panel-init:
        condition: service_completed_successfully
      socket-proxy:
        condition: service_started
    environment:
      L4D2_PANEL_LISTEN: :${L4D2_PANEL_HTTP_PORT:-8080}
      L4D2_PANEL_DATA_ROOT: /srv/l4d2-panel
      L4D2_PANEL_ADMIN_PASSWORD: ${L4D2_PANEL_ADMIN_PASSWORD:?set admin password}
      DOCKER_HOST: tcp://127.0.0.1:${L4D2_PANEL_DOCKER_PROXY_PORT:-23750}
    volumes:
      - ${L4D2_PANEL_DATA_ROOT:-/srv/l4d2-panel}:/srv/l4d2-panel
    network_mode: host
    security_opt: [no-new-privileges:true]
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://127.0.0.1:${L4D2_PANEL_HTTP_PORT:-8080}/api/health"]
      interval: 15s
      timeout: 5s
      retries: 5
networks:
  control:
    internal: true
