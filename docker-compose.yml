services:
  panel-init:
    image: ${ALPINE_IMAGE:-alpine:3.22}
    user: "0:0"
    command: ["sh", "-c", "mkdir -p \"$$DATA_ROOT\" && chown -R 10001:10001 \"$$DATA_ROOT\""]
    environment:
      DATA_ROOT: ${L4D2_PANEL_DATA_ROOT:-/srv/l4d2-panel}
    volumes:
      - ${L4D2_PANEL_DATA_ROOT:-/srv/l4d2-panel}:${L4D2_PANEL_DATA_ROOT:-/srv/l4d2-panel}
    restart: "no"
  runtime-image:
    image: l4d2-server-runtime:latest
    build:
      context: runtime
      args:
        STEAMCMD_IMAGE: ${STEAMCMD_IMAGE:-cm2network/steamcmd:root}
    entrypoint: ["/bin/true"]
    profiles: [images]
  socket-proxy:
    image: l4d2-docker-socket-proxy:latest
    build:
      context: .
      dockerfile: socket-proxy/Dockerfile
      args:
        GO_IMAGE: ${GO_IMAGE:-golang:1.25-alpine}
        ALPINE_IMAGE: ${ALPINE_IMAGE:-alpine:3.22}
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      LISTEN_ADDR: 127.0.0.1:${L4D2_PANEL_DOCKER_PROXY_PORT:-23750}
    network_mode: host
    read_only: true
    user: "0:0"
    cap_drop: [ALL]
    security_opt: [no-new-privileges:true]
  panel:
    build:
      context: .
      args:
        NODE_IMAGE: ${NODE_IMAGE:-node:22-alpine}
        GO_IMAGE: ${GO_IMAGE:-golang:1.25-alpine}
        ALPINE_IMAGE: ${ALPINE_IMAGE:-alpine:3.22}
    restart: unless-stopped
    depends_on:
      panel-init:
        condition: service_completed_successfully
      socket-proxy:
        condition: service_started
    environment:
      L4D2_PANEL_LISTEN: 127.0.0.1:${L4D2_PANEL_HTTP_PORT:-8080}
      L4D2_PANEL_DATA_ROOT: ${L4D2_PANEL_DATA_ROOT:-/srv/l4d2-panel}
      L4D2_PANEL_ADMIN_PASSWORD: ${L4D2_PANEL_ADMIN_PASSWORD:?set admin password}
      DOCKER_HOST: tcp://127.0.0.1:${L4D2_PANEL_DOCKER_PROXY_PORT:-23750}
      L4D2_PANEL_DOWNLOAD_PROXY: ${L4D2_PANEL_DOWNLOAD_PROXY:-}
    volumes:
      - ${L4D2_PANEL_DATA_ROOT:-/srv/l4d2-panel}:${L4D2_PANEL_DATA_ROOT:-/srv/l4d2-panel}
    network_mode: host
    security_opt: [no-new-privileges:true]
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://127.0.0.1:${L4D2_PANEL_HTTP_PORT:-8080}/api/health"]
      interval: 15s
      timeout: 5s
      retries: 5
