services:
  socket-proxy:
    image: tecnativa/docker-socket-proxy:0.3.0
    restart: unless-stopped
    environment:
      CONTAINERS: 1
      IMAGES: 1
      INFO: 1
      NETWORKS: 0
      SERVICES: 0
      TASKS: 0
      VOLUMES: 0
      POST: 1
      AUTH: 0
      SECRETS: 0
      SWARM: 0
      SYSTEM: 0
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks: [control]
    ports: ["127.0.0.1:23750:2375"]
    read_only: true
  panel:
    build: .
    restart: unless-stopped
    depends_on: [socket-proxy]
    environment:
      L4D2_PANEL_LISTEN: :8080
      L4D2_PANEL_DATA_ROOT: /srv/l4d2-panel
      L4D2_PANEL_ADMIN_PASSWORD: ${L4D2_PANEL_ADMIN_PASSWORD:?set admin password}
      DOCKER_HOST: tcp://127.0.0.1:23750
    volumes:
      - ${L4D2_PANEL_DATA_ROOT:-/srv/l4d2-panel}:/srv/l4d2-panel
    network_mode: host
    security_opt: [no-new-privileges:true]
networks:
  control:
    internal: true
