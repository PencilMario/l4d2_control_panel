services:
  panel-init:
    image: ${ALPINE_IMAGE:-alpine:3.22}
    user: "0:0"
    command: ["sh", "-c", "mkdir -p \"$$DATA_ROOT\" && chown 10001:10001 \"$$DATA_ROOT\""]
    environment:
      DATA_ROOT: ${L4D2_PANEL_DATA_ROOT:-/srv/l4d2-panel}
    volumes:
      - ${L4D2_PANEL_DATA_ROOT:-/srv/l4d2-panel}:${L4D2_PANEL_DATA_ROOT:-/srv/l4d2-panel}
    restart: "no"
  runtime-image:
    image: l4d2-server-runtime:latest
    build:
      context: runtime
      args:
        STEAMCMD_IMAGE: ${STEAMCMD_IMAGE:-cm2network/steamcmd:root}
    entrypoint: ["/bin/true"]
    profiles: [images]
  proxy-init:
    image: ${ALPINE_IMAGE:-alpine:3.22}
    user: "0:0"
    command: ["sh", "-c", "chown 0:10001 /run/l4d2-panel && chmod 0750 /run/l4d2-panel"]
    volumes:
      - panel-proxy-run:/run/l4d2-panel
    restart: "no"
    cap_drop: [ALL]
    cap_add: [CHOWN]
    security_opt: [no-new-privileges:true]
  socket-proxy:
    image: l4d2-docker-socket-proxy:latest
    build:
      context: .
      dockerfile: socket-proxy/Dockerfile
      args:
        GO_IMAGE: ${GO_IMAGE:-golang:1.25-alpine}
        ALPINE_IMAGE: ${ALPINE_IMAGE:-alpine:3.22}
        GOPROXY: ${GOPROXY:-https://proxy.golang.org,direct}
    restart: unless-stopped
    depends_on:
      proxy-init:
        condition: service_completed_successfully
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - panel-proxy-run:/run/l4d2-panel
    environment:
      SOCKET_PATH: /run/l4d2-panel/proxy.sock
    network_mode: host
    read_only: true
    user: "0:10001"
    cap_drop: [ALL]
    cap_add: [NET_RAW]
    security_opt: [no-new-privileges:true]
  overlay-helper:
    image: l4d2-overlay-helper:latest
    build:
      context: .
      dockerfile: overlay-helper/Dockerfile
      args:
        GO_IMAGE: ${GO_IMAGE:-golang:1.25-alpine}
        ALPINE_IMAGE: ${ALPINE_IMAGE:-alpine:3.22}
        GOPROXY: ${GOPROXY:-https://proxy.golang.org,direct}
    restart: unless-stopped
    network_mode: none
    read_only: true
    user: "0:10001"
    environment:
      L4D2_PANEL_DATA_ROOT: ${L4D2_PANEL_DATA_ROOT:-/srv/l4d2-panel}
      OVERLAY_HELPER_SOCKET: /run/l4d2-panel/overlay.sock
    volumes:
      - ${L4D2_PANEL_DATA_ROOT:-/srv/l4d2-panel}:${L4D2_PANEL_DATA_ROOT:-/srv/l4d2-panel}:rshared
      - panel-overlay-run:/run/l4d2-panel
    cap_drop: [ALL]
    cap_add: [SYS_ADMIN, DAC_OVERRIDE, FOWNER, MKNOD, CHOWN]
    security_opt: [no-new-privileges:true, apparmor:unconfined, seccomp:unconfined]
  panel:
    build:
      context: .
      args:
        NODE_IMAGE: ${NODE_IMAGE:-node:22-alpine}
        GO_IMAGE: ${GO_IMAGE:-golang:1.25-alpine}
        ALPINE_IMAGE: ${ALPINE_IMAGE:-alpine:3.22}
        GOPROXY: ${GOPROXY:-https://proxy.golang.org,direct}
    restart: unless-stopped
    network_mode: bridge
    depends_on:
      panel-init:
        condition: service_completed_successfully
      socket-proxy:
        condition: service_started
      overlay-helper:
        condition: service_started
    environment:
      L4D2_PANEL_LISTEN: 0.0.0.0:8080
      L4D2_PANEL_GAME_HOST: ${L4D2_PANEL_GAME_HOST:?set the host address SRCDS answers on}
      L4D2_PANEL_DATA_ROOT: ${L4D2_PANEL_DATA_ROOT:-/srv/l4d2-panel}
      L4D2_PANEL_ADMIN_PASSWORD: ${L4D2_PANEL_ADMIN_PASSWORD:?set admin password}
      DOCKER_HOST: unix:///run/l4d2-panel/proxy.sock
      L4D2_PANEL_OVERLAY_SOCKET: /run/l4d2-panel-overlay/overlay.sock
      L4D2_PANEL_DOWNLOAD_PROXY: ${L4D2_PANEL_DOWNLOAD_PROXY:-}
      HTTP_PROXY: ${L4D2_PANEL_DOWNLOAD_PROXY:-}
      HTTPS_PROXY: ${L4D2_PANEL_DOWNLOAD_PROXY:-}
      NO_PROXY: ${L4D2_PANEL_NO_PROXY:-localhost,127.0.0.1}
      L4D2_PANEL_SECURE_COOKIE: ${L4D2_PANEL_SECURE_COOKIE:-true}
    ports:
      - "${L4D2_PANEL_HTTP_PORT:-18081}:8080"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ${L4D2_PANEL_DATA_ROOT:-/srv/l4d2-panel}:${L4D2_PANEL_DATA_ROOT:-/srv/l4d2-panel}:rshared
      - panel-proxy-run:/run/l4d2-panel
      - panel-overlay-run:/run/l4d2-panel-overlay
    cap_add: [CHOWN]
    security_opt: [no-new-privileges:true]
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://127.0.0.1:8080/api/health"]
      interval: 15s
      timeout: 5s
      retries: 5

volumes:
  panel-proxy-run:
  panel-overlay-run:
